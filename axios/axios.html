<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza King – Axios CRUD (Egységesített)</title>
    <link rel="stylesheet" href="../JavaScript/style.css">
    <script src="../menu.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<main id="root"></main>

<script type="text/babel">
    const { useState, useEffect } = React;
    const API_URL = 'api.php';

    function App() {
        const [rendelesek, setRendelesek] = useState([]);
        const [pizzaNev, setPizzaNev] = useState("");
        const [darab, setDarab] = useState(1);
        const [meret, setMeret] = useState("apród");
        const [vevoNev, setVevoNev] = useState("");
        const [szerkesztettId, setSzerkesztettId] = useState(null);
        const [uzenet, setUzenet] = useState("");

        useEffect(() => {
            betolt();
        }, []);

        const betolt = () => {
            axios.get(API_URL).then(res => setRendelesek(res.data));
        };

        const mezokUritese = () => {
            setPizzaNev("");
            setDarab(1);
            setMeret("apród");
            setVevoNev("");
            setSzerkesztettId(null);
        };

        const mentes = () => {
            if (!pizzaNev || !vevoNev) {
                setUzenet("Kérlek, tölts ki minden mezőt!");
                return;
            }

            const adat = {
                pizza_nev: pizzaNev, // API ezt várja
                darab: darab,
                meret: meret,
                vevo_nev: vevoNev
            };

            if (szerkesztettId) {
                axios.put(API_URL, { ...adat, id: szerkesztettId })
                    .then(() => {
                        setUzenet("Rendelés módosítva.");
                        mezokUritese();
                        betolt();
                    });
            } else {
                axios.post(API_URL, adat)
                    .then(() => {
                        setUzenet("Új rendelés hozzáadva.");
                        mezokUritese();
                        betolt();
                    });
            }
        };

        const torol = (id) => {
            if (confirm("Biztosan törlöd?")) {
                axios.delete(API_URL, { data: { id } }).then(() => {
                    setUzenet("A rendelés törölve lett.");
                    betolt();
                });
            }
        };

        return (
            <section className="crud-card">
                <h2 className="section-title">Pizza rendelések kezelése – Axios CRUD</h2>

                <div className="form-row">
                    <input
                        type="text"
                        placeholder="Pizza neve"
                        value={pizzaNev}
                        onChange={(e) => setPizzaNev(e.target.value)}
                    />
                    <input
                        type="number"
                        min="1"
                        value={darab}
                        onChange={(e) => setDarab(e.target.value)}
                    />
                    <select value={meret} onChange={(e) => setMeret(e.target.value)}>
                        <option value="apród">apród</option>
                        <option value="főnemes">főnemes</option>
                        <option value="lovag">lovag</option>
                        <option value="király">király</option>
                    </select>
                    <input
                        type="text"
                        placeholder="Vevő neve"
                        value={vevoNev}
                        onChange={(e) => setVevoNev(e.target.value)}
                    />
                    <button className="btn-primary" onClick={mentes}>
                        {szerkesztettId ? "Módosítás" : "Mentés"}
                    </button>
                </div>

                {uzenet && <div className="empty-box" style={{marginBottom: "18px"}}>{uzenet}</div>}

                {rendelesek.length === 0 ? (
                    <div className="empty-box">Jelenleg nincs egyetlen rendelés sem.</div>
                ) : (
                    <ul className="order-list">
                        {rendelesek.map((r) => (
                            <li key={r.az}>
                                <div className="order-info">
                                    <strong>{r.pizzanev}</strong>
                                    <span>Méret: {r.meret}</span>
                                    <span>Darab: {r.darab}</span>
                                    <span>Vevő: {r.vevonev}</span>
                                </div>
                                <div className="actions">
                                    <button className="btn-edit" onClick={() => {
                                        setSzerkesztettId(r.az);
                                        setPizzaNev(r.pizzanev);
                                        setDarab(r.darab);
                                        setMeret(r.meret);
                                        setVevoNev(r.vevonev);
                                    }}>Szerkesztés</button>
                                    <button className="btn-delete" onClick={() => torol(r.az)}>Törlés</button>
                                </div>
                            </li>
                        ))}
                    </ul>
                )}
            </section>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
</script>

</body>
</html>
