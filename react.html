<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza King – React CRUD</title>
    <link rel="stylesheet" href="JavaScript/style.css">
    <script src="menu.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

<main id="root"></main>

<script type="text/babel">
    const { useState } = React;

    function App() {
        const [rendelesek, setRendelesek] = useState([
            {
                pizzaNev: "Hawaii",
                darab: 1,
                meret: "főnemes",
                vevoNev: "Szabó Márk"
            },
            {
                pizzaNev: "Csupa sajt",
                darab: 3,
                meret: "lovag",
                vevoNev: "Tóth Luca"
            }
        ]);

        const [pizzaNev, setPizzaNev] = useState("");
        const [darab, setDarab] = useState(1);
        const [meret, setMeret] = useState("apród");
        const [vevoNev, setVevoNev] = useState("");
        const [szerkesztettIndex, setSzerkesztettIndex] = useState(null);
        const [uzenet, setUzenet] = useState("");

        const pizzaLista = ["Áfonyás", "Babos", "Barbecue chicken", "Betyáros", "Caribi", "Country", "Csabesz", "Csupa sajt", "Gombás", "Hawaii", "Király pizza"];

        const mezokUritese = () => {
            setPizzaNev("");
            setDarab(1);
            setMeret("apród");
            setVevoNev("");
            setSzerkesztettIndex(null);
        };

        const mentes = () => {
            if (!pizzaNev || !vevoNev) {
                setUzenet("Kérlek, tölts ki minden mezőt!");
                setTimeout(() => setUzenet(""), 2000);
                return;
            }

            const ujRendeles = { pizzaNev, darab, meret, vevoNev };

            if (szerkesztettIndex !== null) {
                const frissitett = [...rendelesek];
                frissitett[szerkesztettIndex] = ujRendeles;
                setRendelesek(frissitett);
                setUzenet("Rendelés módosítva.");
            } else {
                setRendelesek([...rendelesek, ujRendeles]);
                setUzenet("Új rendelés hozzáadva.");
            }

            mezokUritese();
            setTimeout(() => setUzenet(""), 2000);
        };

        const torles = (index) => {
            if (window.confirm("Biztosan törlöd?")) {
                setRendelesek(rendelesek.filter((_, i) => i !== index));
                setUzenet("A rendelés törölve lett.");
                setTimeout(() => setUzenet(""), 2000);
            }
        };

        const szerkesztes = (index) => {
            const r = rendelesek[index];
            setPizzaNev(r.pizzaNev);
            setDarab(r.darab);
            setMeret(r.meret);
            setVevoNev(r.vevoNev);
            setSzerkesztettIndex(index);
        };

        return (
            <section className="crud-card">
                <h2 className="section-title">Pizza rendelések kezelése – React CRUD</h2>

                <div className="form-row">
                    <select value={pizzaNev} onChange={(e) => setPizzaNev(e.target.value)}>
                        <option value="">  Válassz pizzát  </option>
                        {pizzaLista.map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                    <input
                        type="number"
                        min="1"
                        value={darab}
                        onChange={(e) => setDarab(e.target.value)}
                    />
                    <select value={meret} onChange={(e) => setMeret(e.target.value)}>
                        <option value="apród">apród</option>
                        <option value="főnemes">főnemes</option>
                        <option value="lovag">lovag</option>
                        <option value="király">király</option>
                    </select>
                    <input
                        type="text"
                        placeholder="Vevő neve"
                        value={vevoNev}
                        onChange={(e) => setVevoNev(e.target.value)}
                    />
                    <button className="btn-primary" onClick={mentes}>
                        {szerkesztettIndex !== null ? "Módosítás" : "Mentés"}
                    </button>
                </div>

                {uzenet && <div className="empty-box" style={{marginBottom: "18px"}}>{uzenet}</div>}

                {rendelesek.length === 0 ? (
                    <div className="empty-box">Jelenleg nincs egyetlen rendelés sem.</div>
                ) : (
                    <ul className="order-list">
                        {rendelesek.map((rendeles, index) => (
                            <li key={index}>
                                <div className="order-info">
                                    <strong>{rendeles.pizzaNev}</strong>
                                    <span>Méret: {rendeles.meret}</span>
                                    <span>Darab: {rendeles.darab}</span>
                                    <span>Vevő: {rendeles.vevoNev}</span>
                                </div>

                                <div className="actions">
                                    <button className="btn-edit" onClick={() => szerkesztes(index)}>
                                        Szerkesztés
                                    </button>
                                    <button className="btn-delete" onClick={() => torles(index)}>
                                        Törlés
                                    </button>
                                </div>
                            </li>
                        ))}
                    </ul>
                )}
            </section>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
</script>

</body>
</html>
