<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza King – OOJS Interface</title>
    <link rel="stylesheet" href="../JavaScript/style.css">
    <script src="../menu.js"></script>
    <style>
        .canvas-area {
            position: relative;
            width: 100%;
            height: 500px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 20px;
        }
        .pizza-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            user-select: none;
        }
        .controls-panel { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<main class="crud-card">
    <h2 class="section-title">Rendelés Vizualizáció (OOJS)</h2>
    
    <div class="controls-panel">
        <button class="btn-primary" id="add-aprod">Apród hozzáadása</button>
        <button class="btn-primary" id="add-lovag">Lovag hozzáadása</button>
        <button class="btn-primary" id="add-kiraly">Király hozzáadása</button>
        <button class="btn-secondary" id="clear-canvas">Vászon ürítése</button>
    </div>

    <div id="canvas" class="canvas-area"></div>
</main>

<script>
    /**
     * Alaposztály a vizuális elemekhez
     */
    class BaseVisualElement {
        constructor(label, color) {
            this.label = label;
            this.color = color;
            this.element = document.createElement('div');
        }

        getPosition(container) {
            const x = Math.random() * (container.clientWidth - 100);
            const y = Math.random() * (container.clientHeight - 100);
            return { x, y };
        }

        render(container) {
            const pos = this.getPosition(container);
            this.element.className = 'pizza-item';
            this.element.style.backgroundColor = this.color;
            this.element.style.left = `${pos.x}px`;
            this.element.style.top = `${pos.y}px`;
            this.element.innerText = this.label;
            
            container.appendChild(this.element);
        }
    }

    /**
     * Kiterjesztett osztály specifikus tulajdonságokkal
     */
    class PizzaElement extends BaseVisualElement {
        constructor(type, size, shape) {
            // Szülő osztály konstruktorának hívása
            const colorMap = { 'apród': '#f77f00', 'lovag': '#d62828', 'király': '#8d0801' };
            super(type.toUpperCase(), colorMap[type] || '#333');
            
            this.size = size;
            this.shape = shape;
        }

        // Metódus felülírás (Override)
        render(container) {
            super.render(container); // Alap pozicionálás és stílus
            
            this.element.style.width = `${this.size}px`;
            this.element.style.height = `${this.size}px`;
            this.element.style.borderRadius = this.shape === 'circle' ? '50%' : '4px';
        }
    }

    /**
     * Fő alkalmazás osztály (A barátod kódja alapján)
     */
    class PizzaApp {
        constructor(canvasSelector) {
            this.canvas = document.querySelector(canvasSelector);
            this.state = {
                elements: []
            };
        }

        init() {
            this.attachEventListeners();
        }

        attachEventListeners() {
            document.getElementById('add-aprod').addEventListener('click', () => this.addElement('apród', 70, 'square'));
            document.getElementById('add-lovag').addEventListener('click', () => this.addElement('lovag', 90, 'square'));
            document.getElementById('add-kiraly').addEventListener('click', () => this.addElement('király', 110, 'circle'));
            document.getElementById('clear-canvas').addEventListener('click', () => this.clear());
        }

        addElement(type, size, shape) {
            const newPizza = new PizzaElement(type, size, shape);
            newPizza.render(this.canvas);
            this.state.elements.push(newPizza);
        }

        clear() {
            this.canvas.innerHTML = '';
            this.state.elements = [];
        }
    }

    // Alkalmazás példányosítása és indítása
    const app = new PizzaApp('#canvas');
    window.addEventListener('DOMContentLoaded', () => {
        app.init();
    });
</script>

</body>
</html>
