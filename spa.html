<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza King – SPA</title>
    <link rel="stylesheet" href="JavaScript/style.css">
    <script src="menu.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

<main id="root"></main>

<script type="text/babel">
    const { useState } = React;

    function PizzaSzamlalo() {
        const [db, setDb] = useState(0);

        return (
            <div className="info-card" style={{maxWidth: "500px", margin: "0 auto"}}>
                <h3 style={{marginTop: 0, color: "#c1121f"}}>Pizza számláló</h3>
                <p>Számold, hány pizzát adnál le egy nagyobb rendelésben.</p>

                <div style={{fontSize: "56px", fontWeight: "bold", margin: "25px 0", color: "#8d0801"}}>
                    {db}
                </div>

                <div className="actions" style={{justifyContent: "center"}}>
                    <button className="btn-primary" onClick={() => setDb(db + 1)}>+1 pizza</button>
                    <button className="btn-edit" onClick={() => setDb(db > 0 ? db - 1 : 0)}>-1 pizza</button>
                    <button className="btn-secondary" onClick={() => setDb(0)}>Nullázás</button>
                </div>
            </div>
        );
    }

    function ArKalkulator() {
        const [pizza, setPizza] = useState("Margarita");
        const [meret, setMeret] = useState("Kicsi");
        const [darab, setDarab] = useState(1);

        const arak = {
            "Margarita": 2200,
            "Sonkás": 2600,
            "Magyaros": 2900,
            "Négysajtos": 3100
        };

        const meretSzorzo = {
            "Kicsi": 1,
            "Közepes": 1.25,
            "Nagy": 1.5
        };

        const vegosszeg = Math.round(arak[pizza] * meretSzorzo[meret] * darab);

        return (
            <div className="info-card" style={{maxWidth: "560px", margin: "0 auto"}}>
                <h3 style={{marginTop: 0, color: "#c1121f"}}>Pizza árkalkulátor</h3>
                <p>Válaszd ki a pizzát, a méretet és a darabszámot.</p>

                <div className="form-row" style={{gridTemplateColumns: "1fr 1fr 1fr"}}>
                    <select value={pizza} onChange={(e) => setPizza(e.target.value)}>
                        <option value="Margarita">Margarita</option>
                        <option value="Sonkás">Sonkás</option>
                        <option value="Magyaros">Magyaros</option>
                        <option value="Négysajtos">Négysajtos</option>
                    </select>

                    <select value={meret} onChange={(e) => setMeret(e.target.value)}>
                        <option value="Kicsi">Kicsi</option>
                        <option value="Közepes">Közepes</option>
                        <option value="Nagy">Nagy</option>
                    </select>

                    <input
                        type="number"
                        min="1"
                        value={darab}
                        onChange={(e) => setDarab(Number(e.target.value))}
                    />
                </div>

                <div className="empty-box" style={{fontSize: "22px", marginTop: "20px"}}>
                    Végösszeg: <strong>{vegosszeg} Ft</strong>
                </div>
            </div>
        );
    }

    function App() {
        const [aktivMenu, setAktivMenu] = useState("szamlalo");

        return (
            <section className="crud-card">
                <h2 className="section-title">Pizza King – Single Page Application</h2>

                <div className="actions" style={{justifyContent: "center", marginBottom: "25px"}}>
                    <button
                        className={aktivMenu === "szamlalo" ? "btn-primary" : "btn-secondary"}
                        onClick={() => setAktivMenu("szamlalo")}
                    >
                        Pizza számláló
                    </button>

                    <button
                        className={aktivMenu === "kalkulator" ? "btn-primary" : "btn-secondary"}
                        onClick={() => setAktivMenu("kalkulator")}
                    >
                        Ár kalkulátor
                    </button>
                </div>

                {aktivMenu === "szamlalo" ? <PizzaSzamlalo /> : <ArKalkulator />}
            </section>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
