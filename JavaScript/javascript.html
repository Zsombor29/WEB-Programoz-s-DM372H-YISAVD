<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza King – JavaScript CRUD</title>
    <link rel="stylesheet" href="style.css">
    <script src="../menu.js"></script>
</head>
<body>

<main>
    <section class="crud-card">
        <h2 class="section-title">Pizza rendelések kezelése – JavaScript CRUD</h2>

        <div class="form-row">
            <input type="text" id="pizzaNev" placeholder="Pizza neve">
            <input type="number" id="darab" min="1" value="1" placeholder="Darab">
            <select id="meret">
                <option value="Kicsi">apród</option>
                <option value="Közepes">főneves</option>
                <option value="Nagy">lovag</option>
                <option value="Nagy">király</option>
            </select>
            <input type="text" id="vevoNev" placeholder="Vevő neve">
            <button class="btn-primary" onclick="mentesRendeles()">Mentés</button>
        </div>

        <div id="uzenet"></div>
        <ul id="rendelesLista" class="order-list"></ul>
    </section>
</main>

<script>
    let rendelesek = [
        {
            pizzaNev: "Sonkás pizza",
            darab: 2,
            meret: "király",
            vevoNev: "Kiss Anna"
        },
        {
            pizzaNev: "Magyaros pizza",
            darab: 1,
            meret: "főnemes",
            vevoNev: "Nagy Péter"
        }
    ];

    let szerkesztettIndex = -1;

    function uzenetKiir(szoveg) {
        document.getElementById("uzenet").innerHTML = `<div class="empty-box">${szoveg}</div>`;
        setTimeout(() => {
            document.getElementById("uzenet").innerHTML = "";
        }, 1800);
    }

    function listaMegjelenitese() {
        const lista = document.getElementById("rendelesLista");
        lista.innerHTML = "";

        if (rendelesek.length === 0) {
            lista.innerHTML = `<div class="empty-box">Jelenleg nincs egyetlen rendelés sem.</div>`;
            return;
        }

        rendelesek.forEach((rendeles, index) => {
            lista.innerHTML += `
                <li>
                    <div class="order-info">
                        <strong>${rendeles.pizzaNev}</strong>
                        <span>Méret: ${rendeles.meret}</span>
                        <span>Darab: ${rendeles.darab}</span>
                        <span>Vevő: ${rendeles.vevoNev}</span>
                    </div>

                    <div class="actions">
                        <button class="btn-edit" onclick="szerkesztes(${index})">Szerkesztés</button>
                        <button class="btn-delete" onclick="torles(${index})">Törlés</button>
                    </div>
                </li>
            `;
        });
    }

    function mezoErtekek() {
        return {
            pizzaNev: document.getElementById("pizzaNev").value.trim(),
            darab: parseInt(document.getElementById("darab").value),
            meret: document.getElementById("meret").value,
            vevoNev: document.getElementById("vevoNev").value.trim()
        };
    }

    function mezokUritese() {
        document.getElementById("pizzaNev").value = "";
        document.getElementById("darab").value = 1;
        document.getElementById("meret").value = "Kicsi";
        document.getElementById("vevoNev").value = "";
        szerkesztettIndex = -1;
        document.querySelector(".btn-primary").textContent = "Mentés";
    }

    function mentesRendeles() {
        const ujRendeles = mezoErtekek();

        if (!ujRendeles.pizzaNev || !ujRendeles.vevoNev || !ujRendeles.darab || ujRendeles.darab < 1) {
            uzenetKiir("Kérlek, tölts ki minden mezőt helyesen.");
            return;
        }

        if (szerkesztettIndex === -1) {
            rendelesek.push(ujRendeles);
            uzenetKiir("Új rendelés sikeresen hozzáadva.");
        } else {
            rendelesek[szerkesztettIndex] = ujRendeles;
            uzenetKiir("Rendelés sikeresen módosítva.");
        }

        mezokUritese();
        listaMegjelenitese();
    }

    function szerkesztes(index) {
        const rendeles = rendelesek[index];

        document.getElementById("pizzaNev").value = rendeles.pizzaNev;
        document.getElementById("darab").value = rendeles.darab;
        document.getElementById("meret").value = rendeles.meret;
        document.getElementById("vevoNev").value = rendeles.vevoNev;

        szerkesztettIndex = index;
        document.querySelector(".btn-primary").textContent = "Módosítás mentése";
    }

    function torles(index) {
        if (confirm("Biztosan törölni szeretnéd ezt a rendelést?")) {
            rendelesek.splice(index, 1);
            mezokUritese();
            listaMegjelenitese();
            uzenetKiir("A rendelés törölve lett.");
        }
    }

    listaMegjelenitese();
</script>

</body>
</html>
